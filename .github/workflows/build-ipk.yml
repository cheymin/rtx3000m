name: Build ImmortalWrt IPK for RAX3000M

on:
  workflow_dispatch:
    inputs:
      target_packages:
        description: 'Target packages to build (comma separated)'
        required: false
        default: 'kmod-rt2800-usb,kmod-rt2800-lib,kmod-rt2x00-usb,kmod-rt2x00-lib,kmod-mac80211,kmod-cfg80211,kmod-lib-crc-ccitt,rt2800-usb-firmware'
        type: string

env:
  TARGET_VERMAGIC: '95bd0ce1eaacca05fba624a6c17420f3'
  OPENWRT_VERSION: '21.02'
  DEVICE: 'cmcc_rax3000m'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 600

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Clone ImmortalWrt source
        run: |
          git clone --depth=1 --branch=openwrt-${{ env.OPENWRT_VERSION }} \
            https://github.com/hanwckf/immortalwrt-mt798x.git immortalwrt
          cd immortalwrt
          echo "Source commit: $(git rev-parse HEAD)"

      - name: Apply kernel config
        run: |
          cd immortalwrt
          # Copy the exact kernel config from device
          cp ../kernel_config.txt target/linux/mediatek/mt7981/config-5.4

      - name: Configure build
        run: |
          cd immortalwrt
          # Generate .config with target device and packages
          cat > .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_mt7981=y
          CONFIG_TARGET_DEVICE_mediatek_mt7981_DEVICE_cmcc_rax3000m=y
          CONFIG_ALL_KMODS=y
          CONFIG_ALL_NONSHARED=y
          CONFIG_DEVEL=y

          # Target packages
          CONFIG_PACKAGE_kmod-rt2800-usb=y
          CONFIG_PACKAGE_kmod-rt2800-lib=y
          CONFIG_PACKAGE_kmod-rt2x00-usb=y
          CONFIG_PACKAGE_kmod-rt2x00-lib=y
          CONFIG_PACKAGE_kmod-mac80211=y
          CONFIG_PACKAGE_kmod-cfg80211=y
          CONFIG_PACKAGE_kmod-lib-crc-ccitt=y
          CONFIG_PACKAGE_rt2800-usb-firmware=y
          EOF
          make defconfig

      - name: Download sources
        run: |
          cd immortalwrt
          make download -j$(nproc) || make download -j1 V=s

      - name: Build tools and toolchain
        run: |
          cd immortalwrt
          make tools/install -j$(nproc) || make tools/install -j1 V=s
          make toolchain/install -j$(nproc) || make toolchain/install -j1 V=s

      - name: Build kernel
        run: |
          cd immortalwrt
          make target/linux/compile -j$(nproc) V=s

      - name: Check kernel vermagic
        run: |
          cd immortalwrt
          VERMAGIC=$(grep "vermagic=" build_dir/target-aarch64_cortex-a53_musl/linux-mediatek_mt7981/linux-5.4.*/.config 2>/dev/null || \
                     cat build_dir/target-aarch64_cortex-a53_musl/linux-mediatek_mt7981/linux-5.4.*/Module.symvers | head -1 | awk '{print $1}')
          echo "Kernel vermagic: $VERMAGIC"
          echo "Expected: ${{ env.TARGET_VERMAGIC }}"

          # Check modules.vermagic file
          if [ -f build_dir/target-aarch64_cortex-a53_musl/linux-mediatek_mt7981/linux-5.4.*/modules.vermagic ]; then
            VERMAGIC=$(cat build_dir/target-aarch64_cortex-a53_musl/linux-mediatek_mt7981/linux-5.4.*/modules.vermagic)
            echo "modules.vermagic content: $VERMAGIC"
          fi

      - name: Build packages
        run: |
          cd immortalwrt
          make package/kernel/mac80211/compile -j$(nproc) V=s || \
            make package/kernel/mac80211/compile -j1 V=s

      - name: Collect IPK files
        run: |
          mkdir -p output
          cd immortalwrt
          find bin/targets -name "*.ipk" -exec cp {} ../output/ \;
          find bin/packages -name "kmod-rt2800*.ipk" -exec cp {} ../output/ \;
          find bin/packages -name "kmod-rt2x00*.ipk" -exec cp {} ../output/ \;
          find bin/packages -name "kmod-mac80211*.ipk" -exec cp {} ../output/ \;
          find bin/packages -name "kmod-cfg80211*.ipk" -exec cp {} ../output/ \;
          find bin/packages -name "kmod-lib-crc-ccitt*.ipk" -exec cp {} ../output/ \;
          find bin/packages -name "rt2800-usb-firmware*.ipk" -exec cp {} ../output/ \;

          echo "=== Built IPK files ==="
          ls -la ../output/

      - name: Verify vermagic in IPK
        run: |
          cd output
          for ipk in *.ipk; do
            echo "=== Checking $ipk ==="
            tar xzf "$ipk" control.tar.gz 2>/dev/null
            tar xzf control.tar.gz ./control 2>/dev/null
            grep -i "kernel.*5.4.255" ./control || echo "Version info:"
            grep "Depends:" ./control | grep -o "kernel.*[a-f0-9]\{32\}" || true
            rm -f control.tar.gz control 2>/dev/null
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipk-packages
          path: output/*.ipk
          retention-days: 30

      - name: Create release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ipk-${{ github.run_number }}
          name: ImmortalWrt IPK for RAX3000M - Build ${{ github.run_number }}
          files: output/*.ipk
          body: |
            Auto-built IPK packages for CMCC RAX3000M

            Target vermagic: `${{ env.TARGET_VERMAGIC }}`

            Packages included:
            - kmod-rt2800-usb
            - kmod-rt2800-lib
            - kmod-rt2x00-usb
            - kmod-rt2x00-lib
            - kmod-mac80211
            - kmod-cfg80211
            - kmod-lib-crc-ccitt
            - rt2800-usb-firmware
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}