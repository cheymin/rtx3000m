name: Build ImmortalWrt IPK for RAX3000M

on:
  workflow_dispatch:

env:
  TARGET_VERMAGIC: '95bd0ce1eaacca05fba624a6c17420f3'
  SOURCE_COMMIT: '1cf1922e1a33a69db775db8ea09d19469dca9846'
  DEVICE: 'cmcc_rax3000m'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 600

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Clone ImmortalWrt source (5.4.255 kernel)
        run: |
          echo "Cloning at commit ${{ env.SOURCE_COMMIT }} (kernel 5.4.255)"
          git clone https://github.com/hanwckf/immortalwrt-mt798x.git immortalwrt
          cd immortalwrt
          git checkout ${{ env.SOURCE_COMMIT }}
          echo "Source commit: $(git rev-parse HEAD)"
          echo "Kernel version check:"
          cat include/kernel-5.4

      - name: Apply kernel config
        run: |
          cd immortalwrt
          cp ../kernel_config.txt target/linux/mediatek/mt7981/config-5.4

      - name: Configure build
        run: |
          cd immortalwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_mt7981=y
          CONFIG_TARGET_DEVICE_mediatek_mt7981_DEVICE_cmcc_rax3000m=y
          CONFIG_ALL_KMODS=y
          CONFIG_ALL_NONSHARED=y
          CONFIG_DEVEL=y
          CONFIG_PACKAGE_kmod-rt2800-usb=y
          CONFIG_PACKAGE_kmod-rt2800-lib=y
          CONFIG_PACKAGE_kmod-rt2x00-usb=y
          CONFIG_PACKAGE_kmod-rt2x00-lib=y
          CONFIG_PACKAGE_kmod-mac80211=y
          CONFIG_PACKAGE_kmod-cfg80211=y
          CONFIG_PACKAGE_kmod-lib-crc-ccitt=y
          CONFIG_PACKAGE_rt2800-usb-firmware=y
          EOF
          make defconfig

      - name: Download sources
        run: |
          cd immortalwrt
          make download -j$(nproc) || make download -j1 V=s

      - name: Build tools and toolchain
        run: |
          cd immortalwrt
          make tools/install -j$(nproc) || make tools/install -j1 V=s
          make toolchain/install -j$(nproc) || make toolchain/install -j1 V=s

      - name: Build kernel
        run: |
          cd immortalwrt
          make target/linux/compile -j$(nproc) V=s

      - name: Force vermagic to target value
        run: |
          cd immortalwrt
          # 找到 .vermagic 文件并强制覆盖
          VERMAGIC_FILE=$(find build_dir -name ".vermagic" -path "*/linux-5.4.255/*" | head -1)
          if [ -n "$VERMAGIC_FILE" ]; then
            echo "Original vermagic:"
            cat "$VERMAGIC_FILE"
            echo ""
            echo "Overwriting .vermagic with target: ${{ env.TARGET_VERMAGIC }}"
            echo "${{ env.TARGET_VERMAGIC }}" > "$VERMAGIC_FILE"
            cat "$VERMAGIC_FILE"
          else
            echo ".vermagic file not found, will patch IPK post-build instead"
          fi
          # 同时写入 modules.vermagic（如果目录存在才写）
          KERNEL_DIR=$(find build_dir -type d -path "*/linux-mediatek_mt7981/linux-5.4.255" 2>/dev/null | head -1)
          if [ -n "$KERNEL_DIR" ]; then
            echo "${{ env.TARGET_VERMAGIC }}" > "$KERNEL_DIR/modules.vermagic"
            echo "modules.vermagic written to $KERNEL_DIR/modules.vermagic"
          else
            echo "kernel dir not found, skipping modules.vermagic (will patch IPK post-build)"
          fi

      - name: Build packages
        run: |
          cd immortalwrt
          make package/kernel/mac80211/compile -j$(nproc) V=s || \
            make package/kernel/mac80211/compile -j1 V=s

      - name: Collect and patch IPK files
        run: |
          mkdir -p output
          cd immortalwrt
          
          # kmod 包在 bin/targets/mediatek/mt7981/packages/ 下
          find bin/targets -name "kmod-rt2800*.ipk" -exec cp {} ../output/ \;
          find bin/targets -name "kmod-rt2x00*.ipk" -exec cp {} ../output/ \;
          find bin/targets -name "kmod-mac80211*.ipk" -exec cp {} ../output/ \;
          find bin/targets -name "kmod-cfg80211*.ipk" -exec cp {} ../output/ \;
          find bin/targets -name "kmod-lib-crc-ccitt*.ipk" -exec cp {} ../output/ \;
          
          # 固件包在 bin/packages/aarch64_cortex-a53/base/ 下
          find bin/packages -name "rt2800-usb-firmware*.ipk" -exec cp {} ../output/ \;
          
          echo "=== 收集到的 IPK 文件 ==="
          ls -la ../output/

      - name: Patch vermagic in IPK files
        run: |
          cd output
          
          echo "=== 修补 IPK 包中的 vermagic ==="
          echo "目标 vermagic: ${{ env.TARGET_VERMAGIC }}"
          
          for ipk in kmod-*.ipk rt2800-usb-firmware*.ipk; do
            [ -f "$ipk" ] || continue
            
            echo "处理: $ipk"
            mkdir -p ipk_work
            cd ipk_work
            
            tar xzf "../$ipk" 2>/dev/null || { cd ..; rm -rf ipk_work; continue; }
            
            if [ -f "control.tar.gz" ]; then
              tar xzf control.tar.gz 2>/dev/null
              if [ -f "./control" ]; then
                sed -i 's/kernel (= 5\.4\.255-1-[a-f0-9]\{32\}/kernel (= 5.4.255-1-${{ env.TARGET_VERMAGIC }}/g' ./control
                sed -i 's/kernel (=5\.4\.255-1-[a-f0-9]\{32\}/kernel (=5.4.255-1-${{ env.TARGET_VERMAGIC }}/g' ./control
                
                tar czf control.tar.gz ./control 2>/dev/null || tar czf control.tar.gz control
                
                tar czf "../$ipk" debian-binary control.tar.gz data.tar.gz 2>/dev/null || \
                  tar czf "../$ipk" ./debian-binary ./control.tar.gz ./data.tar.gz
                
                echo "  ✓ 已修补"
              fi
            fi
            
            cd ..
            rm -rf ipk_work
          done
          
          echo "=== 最终 IPK 文件 ==="
          ls -la

      - name: Verify patched vermagic
        run: |
          cd output
          echo "=== 验证修补后的 vermagic ==="
          for ipk in kmod-*.ipk rt2800-usb-firmware*.ipk; do
            [ -f "$ipk" ] || continue
            echo "--- $ipk ---"
            tar xzf "$ipk" control.tar.gz 2>/dev/null && \
            tar xzf control.tar.gz ./control 2>/dev/null && \
            grep "Depends:" ./control | grep -o "kernel.*[a-f0-9]\{32\}" || \
            grep "kernel" ./control 2>/dev/null | head -1
            rm -f control.tar.gz ./control control 2>/dev/null
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipk-packages
          path: output/*.ipk
          retention-days: 30

      - name: Create release
        if: success()
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ipk-${{ github.run_number }}-patched
          name: ImmortalWrt IPK for RAX3000M - Build ${{ github.run_number }}
          files: output/*.ipk
          body: |
            IPK packages for CMCC RAX3000M (vermagic patched)

            Target vermagic: `${{ env.TARGET_VERMAGIC }}`
            Kernel version: 5.4.255
            Source commit: `${{ env.SOURCE_COMMIT }}`

            Packages:
            - kmod-rt2800-usb
            - kmod-rt2800-lib
            - kmod-rt2x00-usb
            - kmod-rt2x00-lib
            - kmod-mac80211
            - kmod-cfg80211
            - kmod-lib-crc-ccitt
            - rt2800-usb-firmware
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}