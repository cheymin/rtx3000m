name: Build ImmortalWrt 23.05 Firmware for RAX3000M NAND

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-firmware.yml'
      - 'firmware.config'
      - 'diy-part2.sh'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: firmware.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils python3-setuptools python3-dev rsync unzip zlib1g-dev file wget libelf-dev swig
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Patch device name for RAX3000M
      run: |
        cd openwrt
        echo "=== Before patch ==="
        grep -n "cmcc_rax3000m" target/linux/mediatek/image/filogic.mk | head -20
        # Add SUPPORTED_DEVICES += cmcc,rax3000m to make firmware compatible with current router
        sed -i '/define Device\/cmcc_rax3000m/,/^endef/ {
          /SUPPORTED_DEVICES/! {
            /^endef/i \  SUPPORTED_DEVICES += cmcc,rax3000m
          }
        }' target/linux/mediatek/image/filogic.mk
        echo "=== After patch ==="
        grep -n "cmcc_rax3000m" target/linux/mediatek/image/filogic.mk | head -20

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        echo "=== Selected device config ==="
        grep 'CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_cmcc_rax3000m' .config
        echo "=== All enabled devices ==="
        grep 'CONFIG_TARGET_DEVICE_.*=y' .config
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "=== ALL firmware files generated ==="
        ls -la
        echo "=== cmcc_rax3000m files ==="
        ls -la | grep cmcc_rax3000m
        # Create directory with only cmcc_rax3000m files
        mkdir -p /tmp/firmware_rax3000m
        cp cmcc_rax3000m* /tmp/firmware_rax3000m/ 2>/dev/null
        echo "=== Final files to upload ==="
        ls -la /tmp/firmware_rax3000m/
        echo "FIRMWARE=/tmp/firmware_rax3000m" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: RAX3000M_Firmware${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      continue-on-error: true
      with:
        tag_name: ImmortalWrt-23.05-RAX3000M${{ env.FILE_DATE }}
        body: |
          ImmortalWrt 23.05 for CMCC RAX3000M (NAND)
          - Device name patched: supports both cmcc,rax3000m and cmcc,rax3000m-nand-ubootmod
          - Default theme: Argon
          - Language: Chinese
          - Plugins: OpenClash, ttyd terminal
          - Can be flashed directly via web UI sysupgrade
        files: ${{ env.FIRMWARE }}/*
